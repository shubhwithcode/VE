<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Sofa">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7efe4"/>
      <stop offset="1" stop-color="#fff7ee"/>
    </linearGradient>
    <linearGradient id="sofa" x1="0" x2="1">
      <stop offset="0" stop-color="#c9893a"/>
      <stop offset="1" stop-color="#e0a24f"/>
    </linearGradient>
    <linearGradient id="sofa2" x1="0" x2="1">
      <stop offset="0" stop-color="#b5752f"/>
      <stop offset="1" stop-color="#d4933f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="18" flood-color="#1a1208" flood-opacity="0.18"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#1a1208" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="760" rx="44" fill="url(#bg)"/>

  <g opacity="0.9">
    <circle cx="980" cy="120" r="170" fill="#ff7a18" opacity="0.12"/>
    <circle cx="240" cy="640" r="220" fill="#1c1b19" opacity="0.06"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="170" y="390" width="860" height="210" rx="60" fill="url(#sofa)"/>
    <rect x="200" y="330" width="800" height="150" rx="60" fill="url(#sofa2)"/>
    <rect x="210" y="350" width="350" height="200" rx="54" fill="#d89b49" opacity="0.8"/>
    <rect x="590" y="350" width="380" height="200" rx="54" fill="#d08f41" opacity="0.86"/>

    <g filter="url(#soft)">
      <rect x="310" y="270" width="260" height="160" rx="36" fill="#e7d7c3" opacity="0.92"/>
      <rect x="620" y="260" width="280" height="170" rx="38" fill="#ead9c5" opacity="0.9"/>
      <rect x="350" y="290" width="180" height="120" rx="28" fill="#c7ad8b" opacity="0.25"/>
      <rect x="660" y="284" width="200" height="124" rx="28" fill="#b89567" opacity="0.22"/>
    </g>

    <rect x="130" y="360" width="120" height="260" rx="54" fill="#c07f34"/>
    <rect x="950" y="360" width="120" height="260" rx="54" fill="#c07f34"/>
    <rect x="220" y="585" width="90" height="22" rx="11" fill="#3a2a14" opacity="0.6"/>
    <rect x="890" y="585" width="90" height="22" rx="11" fill="#3a2a14" opacity="0.6"/>
  </g>

  <g opacity="0.22">
    <path d="M70 120c240-120 420-120 660 0" fill="none" stroke="#1c1b19" stroke-width="3"/>
    <path d="M120 160c220-90 380-90 600 0" fill="none" stroke="#1c1b19" stroke-width="2"/>
  </g>
</svg>

