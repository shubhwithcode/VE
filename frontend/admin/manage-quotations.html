<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quotation Feed - Vishwakarma Enterprises</title>

    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="./uiShell.css">

    <style>
        :root {
            --brand-primary: var(--maroon-main);
            --brand-secondary: var(--maroon-deep);
            --bg-color: var(--bg-cream);
            --card-bg: #ffffff;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --border-color: rgba(45, 8, 13, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent;}
        
        body { 
            background-color: var(--bg-cream);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .admin-main {
            padding-top: 120px;
            max-width: 1400px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        /* --- Quotation Feed --- */
        .feed-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 0 20px;
        }

        .quote-card {
            background: #FFF;
            border-radius: 28px;
            padding: 30px;
            border: 1px solid var(--border-color);
            transition: 0.35s;
            position: relative;
            overflow: hidden;
        }

        .quote-card:hover {
            transform: scale(1.01);
            border-color: var(--gold-accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .quote-card::after {
            content: 'QUOTATION';
            position: absolute;
            top: 20px;
            right: -30px;
            background: rgba(197, 160, 41, 0.1);
            color: var(--gold-accent);
            padding: 10px 40px;
            font-size: 0.6rem;
            font-weight: 900;
            letter-spacing: 2px;
            transform: rotate(45deg);
        }

        .quote-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 25px;
        }

        .client-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--maroon-deep);
            margin-bottom: 5px;
        }

        .client-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 700;
        }

        .quote-status {
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 40px;
        }

        .status-pending { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
        .status-sent { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-closed { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }

        .requirement-block {
            background: rgba(45, 8, 13, 0.04);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            border-left: 5px solid var(--maroon-main);
        }

        .req-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 900;
            color: var(--maroon-main);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
        }

        .req-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #374151;
            font-weight: 600;
        }

        .quote-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .estimate-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            font-weight: 800;
            color: #065f46;
        }

        .estimate-badge .material-symbols-rounded {
            color: #059669;
        }

        .action-row {
            display: flex;
            gap: 12px;
        }

        .btn-act {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 800;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-call { background: var(--maroon-main); color: white; }
        .btn-close { background: var(--gold-accent); color: var(--maroon-deep); }

        .btn-act:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

    </style>
</head>
<body>

    <div id="veHeaderMount"></div>

    <main class="admin-main container">
        <header class="showroom-title reveal active" style="margin-bottom: 50px;">
            <p class="hero-subtitle">Valuation Channel</p>
            <h1>Quotation Feed</h1>
            <div class="divider"></div>
        </header>

        <div class="feed-container" id="quoteFeed">
            <!-- Dynamic Quotations -->
        </div>

    </main>

    <div id="veFooterMount"></div>
    <script src="../layout.js"></script>
    <script src="../app.js"></script>
    <script src="./adminCommon.js"></script>

    <script>
        const quoteFeed = document.getElementById('quoteFeed');

        function createQuoteCard(q) {
            const statusClass = `status-${q.status.toLowerCase()}`;
            return `
                <div class="quote-card">
                    <div class="quote-header">
                        <div class="client-info">
                            <h3>${q.customer_name}</h3>
                            <p>Contact: ${q.customer_phone}</p>
                        </div>
                        <span class="quote-status ${statusClass}">${q.status}</span>
                    </div>
                    
                    <div class="requirement-block">
                        <span class="req-label">Client Requirement Detail</span>
                        <div class="req-text">"${q.requirement_detail}"</div>
                    </div>

                    <div class="quote-footer">
                        <div class="estimate-badge">
                            <span class="material-symbols-rounded">payments</span>
                            Estimate: ${q.budget_estimate || 'Not specified'}
                        </div>
                        <div class="action-row">
                            <a href="tel:${q.customer_phone}" class="btn-act btn-call" style="text-decoration: none;">
                                <span class="material-symbols-rounded">call</span>
                                Contact
                            </a>
                            <button class="btn-act btn-close" onclick="closeQuote(${q.id})">
                                <span class="material-symbols-rounded">check_circle</span>
                                Close Deal
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        async function loadQuotes() {
            quoteFeed.innerHTML = '<div style="text-align: center; padding: 100px; color: #9ca3af;">Streaming quotation requests...</div>';
            try {
                const out = await VE.api('/api/admin/quotations');
                if (out.quotations && out.quotations.length > 0) {
                    quoteFeed.innerHTML = out.quotations.map(createQuoteCard).join('');
                } else {
                    quoteFeed.innerHTML = '<div style="text-align: center; padding: 100px; background: white; border-radius: 32px; border: 2px dashed rgba(45, 8, 13, 0.1);"><h3 style="font-family: \'Playfair Display\', serif; color: #9ca3af; margin-bottom: 10px;">The feed is quiet</h3><p style="color: #9ca3af;">Pricing requests from the site will appear here.</p></div>';
                }
            } catch (e) {
                quoteFeed.innerHTML = '<div style="text-align: center; padding: 100px; color: #ef4444;">Valuation transmission failed.</div>';
            }
        }

        async function closeQuote(id) {
            if(!confirm('Mark this quotation as closed?')) return;
            // Simplified action for now
            alert('Quotation #' + id + ' marked as closed.');
        }

        (async function init() {
            if (typeof VEAdmin !== 'undefined') await VEAdmin.ensureAdmin();
            loadQuotes();
        })();
    </script>
</body>
</html>
