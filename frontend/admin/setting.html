<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings - Admin App</title>

    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="./uiShell.css">

    <style>
        :root {
            --primary: var(--maroon-main);
            --bg: var(--bg-cream);
            --card-bg: #ffffff;
            --text-dark: var(--text-dark);
            --text-gray: var(--text-muted);
            --border: rgba(45, 8, 13, 0.1);
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent;}
        
        body { 
            background-color: var(--bg-cream);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .admin-main {
            padding-top: 100px;
            max-width: 1320px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        /* Animated Background Blobs */
        .bg-shape { position: fixed; border-radius: 50%; filter: blur(70px); z-index: -1; opacity: 0.6; }
        .shape-1 { top: -5%; left: -20%; width: 300px; height: 300px; background: #dbeafe; }
        .shape-2 { bottom: 20%; right: -20%; width: 250px; height: 250px; background: #e0e7ff; }

        /* --- Top App Bar --- */
        .app-bar {
            background: var(--primary);
            color: white;
            padding: 20px 20px 30px 20px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 4px 15px rgba(43, 115, 246, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .app-bar-top { display: flex; justify-content: space-between; align-items: center; }
        .app-bar-title h1 { font-size: 1.3rem; font-weight: 800; margin: 0; line-height: 1.2; }
        .app-bar-title p { font-size: 0.8rem; opacity: 0.9; margin: 0; font-weight: 500;}

        .logout-btn {
            background: rgba(255, 255, 255, 0.2); color: white; border: none; padding: 8px 12px;
            border-radius: 10px; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .logout-btn:active { transform: scale(0.95); background: #ef4444;}

        /* --- Settings Container & Cards --- */
        .settings-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: -15px; /* Pull up slightly over the app bar */
            position: relative;
            z-index: 10;
        }

        .settings-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid var(--border);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--border);
        }
        
        .card-icon {
            width: 36px; height: 36px; border-radius: 10px;
            background: #eff6ff; color: var(--primary);
            display: flex; justify-content: center; align-items: center;
            font-size: 1.1rem;
        }

        .card-header h3 { font-size: 1.1rem; font-weight: 800; color: var(--text-dark); margin: 0;}

        /* --- Form Elements --- */
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: 700; color: var(--text-gray); font-size: 0.8rem; }
        .input-group input, .input-group select {
            width: 100%; padding: 12px 15px; border-radius: 12px;
            border: 1px solid var(--border); font-size: 0.95rem; font-weight: 500;
            background-color: #f8fafc; color: var(--text-dark); transition: all 0.3s;
            outline: none; appearance: none; /* removes default browser select arrow in some devices */
        }
        .input-group select { background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2364748b%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 15px top 50%; background-size: 10px auto; }
        
        .input-group input:focus, .input-group select:focus { 
            border-color: var(--primary); background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(43, 115, 246, 0.1); 
        }

        .input-group input[type="file"] { padding: 9px 12px; background: white; font-size: 0.8rem;}

        .btn-save {
            width: 100%; padding: 14px; background-color: var(--primary); 
            color: white; border: none; border-radius: 12px;
            font-size: 0.95rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 12px rgba(43, 115, 246, 0.25);
            transition: 0.2s; margin-top: 5px;
        }
        .btn-save:active { transform: scale(0.97); }


    </style>
</head>
<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div id="veHeaderMount"></div>

    <main class="admin-main container">
        <header class="showroom-title reveal active" style="margin-bottom: 40px;">
            <p class="hero-subtitle">System Configuration</p>
            <h1>Settings</h1>
            <div class="divider"></div>
        </header>

        <div style="display: flex; justify-content: flex-end; margin-bottom: 40px;">
            <button class="logout-btn" onclick="logout()" style="background: var(--maroon-main); color: #FFF; padding: 12px 28px; border-radius: 999px; font-weight: 800; border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(45, 8, 13, 0.2);">
                <span class="material-symbols-rounded" style="vertical-align: middle; margin-right: 8px; font-size: 1.1rem;">logout</span>
                Logout
            </button>
        </div>

    <div class="settings-container">
        
        <div class="settings-card">
            <div class="card-header">
                <div class="card-icon">🏢</div>
                <h3>Company Profile</h3>
            </div>
            <form onsubmit="saveSettings(event, 'Company Profile', this)">
                <div class="input-group">
                    <label>Company/Project Name</label>
                    <input type="text" value="Labour Attendance System" required>
                </div>
                <div class="input-group">
                    <label>Admin Contact Number</label>
                    <input type="tel" value="9876543210" pattern="[0-9]{10}" required>
                </div>
                <div class="input-group">
                    <label>Update Logo</label>
                    <input type="file" accept="image/*">
                </div>
                <button type="submit" class="btn-save">Save Profile</button>
            </form>
        </div>

        <div class="settings-card">
            <div class="card-header">
                <div class="card-icon">⏰</div>
                <h3>Attendance Rules</h3>
            </div>
            <form onsubmit="saveSettings(event, 'Attendance Rules', this)">
                <div class="input-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div>
                        <label>Shift Start</label>
                        <input type="time" value="09:00" required>
                    </div>
                    <div>
                        <label>Shift End</label>
                        <input type="time" value="18:00" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Late Mark Threshold</label>
                    <select>
                        <option value="0">Strict (No Delay Allowed)</option>
                        <option value="15" selected>15 Minutes Grace</option>
                        <option value="30">30 Minutes Grace</option>
                    </select>
                </div>
                <button type="submit" class="btn-save">Update Rules</button>
            </form>
        </div>

        <div class="settings-card">
            <div class="card-header">
                <div class="card-icon">🔒</div>
                <h3>Security</h3>
            </div>
            <form onsubmit="saveSettings(event, 'Security', this)">
                <div class="input-group">
                    <label>Admin Email ID</label>
                    <input type="email" value="admin@example.com" required>
                </div>
                <div class="input-group">
                    <label>Current Password</label>
                    <input type="password" placeholder="Enter current password" required>
                </div>
                <div class="input-group">
                    <label>New Password</label>
                    <input type="password" placeholder="Enter new password" required>
                </div>
                <button type="submit" class="btn-save">Change Password</button>
            </form>
        </div>

    </div>
    </main>

    <div id="veFooterMount"></div>
    <script src="../layout.js"></script>

    <script src="../app.js"></script>
    <script src="./adminCommon.js"></script>
    <script src="./adminShell.js"></script>
    <script src="./adminShell.js"></script>
    <script>
        async function logout() {
            if(confirm("Are you sure you want to logout?")) {
                try { if (typeof VE !== 'undefined') await VE.api('/api/auth/logout', { method: 'POST' }); } catch(e){}
                localStorage.removeItem('ve_auth_token');
                window.location.href = "login.html";
            }
        }

        // Simulate saving process for mobile UX
        function saveSettings(event, sectionName, formElement) {
            event.preventDefault(); 
            const btn = formElement.querySelector('.btn-save');
            const originalText = btn.innerText;
            
            // Loading State
            btn.innerText = "Saving...";
            btn.style.opacity = "0.7";
            
            setTimeout(() => {
                // Success State
                btn.innerText = "Saved ✓";
                btn.style.background = "var(--success)";
                btn.style.opacity = "1";
                
                // Revert back after 2 seconds
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "var(--primary)";
                }, 2000);
                
            }, 800);
        }
    </script>
</body>
</html>
