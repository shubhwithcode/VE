<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inquiries & Leads - Vishwakarma Enterprises</title>

    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="./uiShell.css">

    <style>
        :root {
            --brand-primary: var(--maroon-main);
            --brand-secondary: var(--maroon-deep);
            --bg-color: var(--bg-cream);
            --card-bg: #ffffff;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --border-color: rgba(45, 8, 13, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent;}
        
        body { 
            background-color: var(--bg-cream);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .admin-main {
            padding-top: 120px;
            max-width: 1400px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        /* --- Inquiry Feed --- */
        .feed-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 0 20px;
        }

        .query-card {
            background: #FFF;
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            transition: 0.3s;
            position: relative;
        }

        .query-card:hover {
            transform: scale(1.01);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-color: var(--gold-accent);
        }

        .query-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .curator-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--maroon-deep);
            margin-bottom: 4px;
        }

        .curator-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .query-status {
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-new { background: rgba(197, 160, 41, 0.1); color: #C5A029; border: 1px solid rgba(197, 160, 41, 0.3); }
        .status-read { background: rgba(45, 8, 13, 0.05); color: var(--text-muted); }
        .status-responded { background: #dcfce7; color: #166534; }

        .query-message {
            background: rgba(45, 8, 13, 0.03);
            padding: 20px;
            border-radius: 16px;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
            font-weight: 500;
            color: #374151;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .query-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .date-badge {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 700;
        }

        .action-row {
            display: flex;
            gap: 12px;
        }

        .btn-action {
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-call { background: var(--maroon-main); color: white; }
        .btn-delete { background: #fee2e2; color: #b91c1c; }

        .btn-action:hover { transform: translateY(-2px); }

    </style>
</head>
<body>

    <div id="veHeaderMount"></div>

    <main class="admin-main container">
        <header class="showroom-title reveal active" style="margin-bottom: 50px;">
            <p class="hero-subtitle">Customer Intent</p>
            <h1>Inquiries & Leads</h1>
            <div class="divider"></div>
        </header>

        <div class="feed-container" id="queryFeed">
            <!-- Dynamic Queries -->
        </div>

    </main>

    <div id="veFooterMount"></div>
    <script src="../layout.js"></script>
    <script src="../app.js"></script>
    <script src="./adminCommon.js"></script>

    <script>
        const queryFeed = document.getElementById('queryFeed');

        function formatDate(d) {
            const date = new Date(d);
            return date.toLocaleDateString('en-IN', {
                day: '2-digit', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function createQueryCard(q) {
            const statusClass = `status-${q.status.toLowerCase()}`;
            return `
                <div class="query-card">
                    <div class="query-header">
                        <div class="curator-info">
                            <h3>${q.name}</h3>
                            <p>Phone: ${q.phone} | ${q.email || 'No email provided'}</p>
                        </div>
                        <span class="query-status ${statusClass}">${q.status}</span>
                    </div>
                    <div class="query-message">
                        "${q.message}"
                    </div>
                    <div class="query-footer">
                        <span class="date-badge">${formatDate(q.created_at)}</span>
                        <div class="action-row">
                            <a href="tel:${q.phone}" class="btn-action btn-call" style="text-decoration: none;">
                                <span class="material-symbols-rounded" style="font-size: 1.1rem;">call</span>
                                Contact Client
                            </a>
                            <button class="btn-action btn-delete" onclick="deleteQuery(${q.id})">
                                <span class="material-symbols-rounded" style="font-size: 1.1rem;">delete</span>
                                Dismiss
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        async function loadQueries() {
            queryFeed.innerHTML = '<div style="text-align: center; padding: 100px; color: #9ca3af;">Checking the inquiries feed...</div>';
            try {
                const out = await VE.api('/api/admin/queries');
                if (out.queries && out.queries.length > 0) {
                    queryFeed.innerHTML = out.queries.map(createQueryCard).join('');
                } else {
                    queryFeed.innerHTML = '<div style="text-align: center; padding: 100px; background: white; border-radius: 32px; border: 2px dashed rgba(45, 8, 13, 0.1);"><h3 style="font-family: \'Playfair Display\', serif; color: var(--maroon-main); margin-bottom: 10px;">No leads found</h3><p style="color: #6b7280;">Your showroom is waiting for its next curious visitor.</p></div>';
                }
            } catch (e) {
                queryFeed.innerHTML = '<div style="text-align: center; padding: 100px; color: #ef4444;">Leads feed transmission failed.</div>';
            }
        }

        async function deleteQuery(id) {
            if (!confirm('Are you sure you want to dismiss this inquiry?')) return;
            try {
                await VE.api(`/api/admin/queries/${id}`, { method: 'DELETE' });
                await loadQueries();
            } catch (e) {
                alert('Action failed: ' + e.message);
            }
        }

        (async function init() {
            if (typeof VEAdmin !== 'undefined') await VEAdmin.ensureAdmin();
            loadQueries();
        })();
    </script>
</body>
</html>
