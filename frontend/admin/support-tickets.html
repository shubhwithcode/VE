<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Support Tickets - Admin App</title>

    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="./uiShell.css">

    <style>
        :root {
            --primary: var(--maroon-main);
            --bg: var(--bg-cream);
            --card-bg: #ffffff;
            --text-dark: var(--text-dark);
            --text-gray: var(--text-muted);
            --border: rgba(45, 8, 13, 0.1);
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-dark);
            margin: 0;
            min-height: 100vh;
        }

        .admin-main {
            padding-top: 100px;
            max-width: 1320px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        .filter-box {
            background: white;
            margin: 0 20px 20px;
            padding: 14px 16px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }

        .filter-box select {
            border: none;
            outline: none;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--primary);
            background: transparent;
        }

        .feed-container { padding: 0 20px; display: flex; flex-direction: column; gap: 16px; }
        .ticket-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
        .subject { font-size: 1rem; font-weight: 800; }
        .meta { font-size: 0.78rem; color: var(--text-gray); font-weight: 600; line-height: 1.5; }
        .desc { font-size: 0.9rem; line-height: 1.6; }
        .admin-note {
            width: 100%;
            min-height: 84px;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            font-size: 0.9rem;
            outline: none;
            resize: vertical;
            background: #f8fafc;
        }
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .action-row select, .action-row button {
            width: 100%;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            border: 1px solid var(--border);
        }
        .action-row button {
            background: var(--primary);
            color: white;
            border: none;
        }
        .badge {
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 0.68rem;
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .status-open { background: #fef3c7; color: #92400e; }
        .status-in_progress { background: #e0e7ff; color: #4338ca; }
        .status-resolved { background: #dcfce7; color: #166534; }
        .status-closed { background: #e5e7eb; color: #374151; }
    </style>
</head>
<body>
    <div id="veHeaderMount"></div>

    <main class="admin-main container">
        <header class="showroom-title reveal active" style="margin-bottom: 40px;">
            <p class="hero-subtitle">Support Operations</p>
            <h1>Support Tickets</h1>
            <div class="divider"></div>
        </header>

        <div class="filter-box">
            <span style="font-weight:700; color:var(--text-muted);">View By Status</span>
            <select id="statusFilter">
                <option value="all">All</option>
                <option value="open">Open</option>
                <option value="in_progress">In Progress</option>
                <option value="resolved">Resolved</option>
                <option value="closed">Closed</option>
            </select>
        </div>

        <div id="ticketBody" class="feed-container">
            <div style="text-align:center; padding: 40px; color:#94a3b8;">Loading tickets...</div>
        </div>
    </main>

    <script src="../app.js"></script>
    <script src="./adminCommon.js"></script>
    <script src="./adminShell.js"></script>
    <div id="veFooterMount"></div>
    <script src="../layout.js"></script>
    <script>
        const ticketBody = document.getElementById('ticketBody');
        const statusFilter = document.getElementById('statusFilter');

        function esc(s) {
            return String(s ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function fmtDateTime(value) {
            if (!value) return '-';
            return new Date(value).toLocaleString('en-IN', {
                day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
            });
        }

        function pretty(value) {
            return String(value || '').replace(/_/g, ' ').replace(/\b\w/g, (c) => c.toUpperCase());
        }

        function ticketCard(t) {
            const statusClass = `status-${String(t.status).replace(/[^a-z_]/g, '')}`;
            return `
                <div class="ticket-card" data-id="${t.id}">
                    <div class="head">
                        <div>
                            <div class="subject">${esc(t.subject)}</div>
                            <div class="meta">
                                ${esc(t.name)} (${esc(t.username || '-')}) • ID ${t.staff_id}<br>
                                ${pretty(t.category)} • ${pretty(t.priority)} priority • ${fmtDateTime(t.created_at)}
                            </div>
                        </div>
                        <span class="badge ${statusClass}">${esc(pretty(t.status))}</span>
                    </div>
                    <div class="desc">${esc(t.description)}</div>
                    <textarea class="admin-note" placeholder="Add admin note...">${esc(t.admin_note || '')}</textarea>
                    <div class="action-row">
                        <select class="status-select">
                            <option value="open" ${t.status === 'open' ? 'selected' : ''}>Open</option>
                            <option value="in_progress" ${t.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
                            <option value="resolved" ${t.status === 'resolved' ? 'selected' : ''}>Resolved</option>
                            <option value="closed" ${t.status === 'closed' ? 'selected' : ''}>Closed</option>
                        </select>
                        <button type="button" class="save-btn">Save Update</button>
                    </div>
                    ${t.resolved_at ? `<div class="meta">Resolved/updated: ${fmtDateTime(t.resolved_at)}</div>` : ''}
                </div>
            `;
        }

        async function saveTicket(card) {
            const id = card.getAttribute('data-id');
            const status = card.querySelector('.status-select').value;
            const admin_note = card.querySelector('.admin-note').value;
            await VE.api(`/api/admin/support-tickets/${id}`, {
                method: 'PATCH',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify({ status, admin_note })
            });
            await loadTickets();
        }

        function bindCards() {
            ticketBody.querySelectorAll('.save-btn').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const card = btn.closest('.ticket-card');
                    try {
                        btn.disabled = true;
                        btn.textContent = 'Saving...';
                        await saveTicket(card);
                    } catch (e) {
                        alert(e?.message || 'Update failed');
                    } finally {
                        btn.disabled = false;
                        btn.textContent = 'Save Update';
                    }
                });
            });
        }

        async function loadTickets() {
            ticketBody.innerHTML = `<div style="text-align:center; padding: 40px; color:#94a3b8;">Loading tickets...</div>`;
            try {
                const out = await VE.api(`/api/admin/support-tickets?status=${encodeURIComponent(statusFilter.value)}`);
                const tickets = out?.tickets || [];
                if (!tickets.length) {
                    ticketBody.innerHTML = `<div style="text-align:center; padding: 40px; color:#94a3b8;">No tickets found.</div>`;
                    return;
                }
                ticketBody.innerHTML = tickets.map(ticketCard).join('');
                bindCards();
            } catch (e) {
                ticketBody.innerHTML = `<div style="text-align:center; padding: 40px; color:#ef4444;">Failed to load tickets.</div>`;
            }
        }

        (async function init() {
            if (typeof VEAdmin !== 'undefined') await VEAdmin.ensureAdmin();
            statusFilter.addEventListener('change', loadTickets);
            await loadTickets();
        })();
    </script>
</body>
</html>
