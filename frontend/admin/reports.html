<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Reports - Admin App</title>

    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="./uiShell.css">

    <style>
        :root {
            --primary: var(--maroon-main);
            --bg: var(--bg-cream);
            --card-bg: #ffffff;
            --text-dark: var(--text-dark);
            --text-gray: var(--text-muted);
            --border: rgba(45, 8, 13, 0.1);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent;}
        
        body { 
            background-color: var(--bg-cream);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .admin-main {
            padding-top: 100px;
            max-width: 1320px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        /* --- Top App Bar --- */
        .app-bar {
            background: var(--primary);
            color: white;
            padding: 20px 20px 35px 20px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 4px 15px rgba(43, 115, 246, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .app-bar-top { display: flex; justify-content: space-between; align-items: center; }
        .app-bar-title h1 { font-size: 1.3rem; font-weight: 800; margin: 0; line-height: 1.2; }
        .app-bar-title p { font-size: 0.8rem; opacity: 0.9; margin: 0; font-weight: 500;}

        .logout-btn {
            background: rgba(255, 255, 255, 0.2); color: white; border: none; padding: 8px 12px;
            border-radius: 10px; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .logout-btn:active { transform: scale(0.95); background: #ef4444;}

        /* --- Floating Filter Box --- */
        .filter-box {
            background: white; margin: -25px 20px 20px 20px; padding: 15px;
            border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            display: flex; flex-direction: column; gap: 12px;
            position: relative; z-index: 101; border: 1px solid var(--border);
        }

        .filter-row { display: flex; gap: 10px; }
        .filter-group { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .filter-group label { font-size: 0.7rem; font-weight: 700; color: var(--text-gray); text-transform: uppercase;}
        
        .filter-group input, .filter-group select {
            padding: 10px; border-radius: 10px; border: 1px solid var(--border);
            font-size: 0.9rem; font-weight: 600; color: var(--text-dark); background: #f8fafc;
            outline: none; width: 100%;
        }
        .filter-group input:focus, .filter-group select:focus { border-color: var(--primary); }

        .btn-filter {
            width: 100%; background: var(--primary); color: white; border: none; padding: 12px;
            border-radius: 10px; font-weight: 700; font-size: 0.9rem; cursor: pointer;
            box-shadow: 0 4px 10px rgba(43, 115, 246, 0.2); transition: 0.2s; margin-top: 5px;
        }
        .btn-filter:active { transform: scale(0.97); }

        /* --- Feed Container --- */
        .feed-container { padding: 0 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .report-card {
            background: var(--card-bg); border-radius: 16px; padding: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 15px; overflow: hidden;
        }
        .report-summary {
            list-style: none;
            cursor: pointer;
        }
        .report-summary::-webkit-details-marker {
            display: none;
        }
        .report-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 999px;
            background: #f8fafc;
            color: var(--primary);
            font-size: 1rem;
            font-weight: 800;
            flex-shrink: 0;
            transition: transform 0.2s ease;
        }
        .report-card[open] .report-toggle {
            transform: rotate(180deg);
        }
        .report-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .report-main-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 10px 12px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #f1f5f9;
        }
        .report-main-item span:first-child {
            font-size: 0.65rem;
            color: var(--text-gray);
            font-weight: 700;
            text-transform: uppercase;
        }
        .report-main-item span:last-child {
            font-size: 0.9rem;
            color: var(--text-dark);
            font-weight: 800;
        }
        .report-extra {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .rc-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding-bottom: 12px; border-bottom: 1px solid #f1f5f9;
        }
        
        .rc-name h3 { font-size: 1.05rem; font-weight: 800; color: var(--text-dark); margin: 0; line-height: 1.2;}
        .rc-name p { font-size: 0.75rem; color: var(--text-gray); margin: 0; font-weight: 600;}

        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;}
        .badge.working { background: #fef3c7; color: #b45309; }
        .badge.completed { background: #d1fae5; color: #047857; }

        /* Report Blocks (In, Out, Work) */
        .rc-block {
            background: #f8fafc; border-radius: 12px; padding: 12px;
            border: 1px solid #f1f5f9; position: relative;
        }
        .rc-block::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
            border-top-left-radius: 12px; border-bottom-left-radius: 12px;
        }
        .rc-block.in::before { background: var(--success); }
        .rc-block.out::before { background: var(--danger); }
        .rc-block.work::before { background: var(--primary); }

        .block-title { font-size: 0.7rem; font-weight: 700; color: var(--text-gray); text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 5px;}
        .block-title span { font-size: 1rem; }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .data-item { display: flex; flex-direction: column; gap: 2px;}
        .data-item span:first-child { font-size: 0.65rem; color: var(--text-gray); font-weight: 600;}
        .data-item span:last-child { font-size: 0.85rem; font-weight: 700; color: var(--text-dark);}
        
        .map-link { color: var(--primary); text-decoration: none; font-weight: 700; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 4px;}
        .map-link:active { opacity: 0.7; }

        /* Media Elements */
        .media-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 10px; border-top: 1px dashed #e2e8f0; padding-top: 10px;}
        .thumb { width: 55px; height: 55px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border); box-shadow: 0 2px 5px rgba(0,0,0,0.05);}
        .audio-player { height: 35px; width: 100%; outline: none; border-radius: 10px; background: #f1f5f9;}
        
        .work-text {
            font-size: 0.85rem; color: var(--text-dark); background: white; 
            padding: 10px; border-radius: 8px; font-weight: 500; font-style: italic;
            border: 1px solid var(--border); margin-bottom: 10px;
        }

        @media (max-width: 480px) {
            .feed-container {
                padding: 0 12px;
                gap: 14px;
            }
            .report-card {
                padding: 12px;
                border-radius: 14px;
                gap: 10px;
            }
            .rc-header {
                padding-bottom: 8px;
                gap: 8px;
            }
            .rc-name h3 {
                font-size: 0.98rem;
            }
            .rc-name p {
                font-size: 0.72rem;
            }
            .badge {
                padding: 4px 8px;
                font-size: 0.6rem;
            }
            .report-toggle {
                width: 26px;
                height: 26px;
                font-size: 0.9rem;
            }
            .report-main {
                gap: 8px;
            }
            .report-main-item {
                padding: 8px 10px;
                border-radius: 10px;
            }
            .report-main-item span:first-child {
                font-size: 0.58rem;
            }
            .report-main-item span:last-child {
                font-size: 0.82rem;
            }
            .rc-block {
                padding: 10px;
                border-radius: 10px;
            }
            .block-title {
                font-size: 0.62rem;
                margin-bottom: 6px;
            }
            .block-title span {
                font-size: 0.9rem;
            }
            .data-grid {
                gap: 8px;
                margin-bottom: 8px;
            }
            .data-item span:first-child {
                font-size: 0.58rem;
            }
            .data-item span:last-child,
            .map-link {
                font-size: 0.78rem;
            }
            .media-row {
                gap: 8px;
                margin-top: 8px;
                padding-top: 8px;
            }
            .thumb {
                width: 44px;
                height: 44px;
                border-radius: 8px;
            }
            .work-text {
                font-size: 0.78rem;
                padding: 8px;
            }
        }

    </style>
</head>
<body>

    <div id="veHeaderMount"></div>

    <main class="admin-main container">
        <header class="showroom-title reveal active" style="margin-bottom: 40px;">
            <p class="hero-subtitle">Operational Analysis</p>
            <h1>Daily Reports</h1>
            <div class="divider"></div>
        </header>

        <div style="display: flex; justify-content: flex-end; margin-bottom: 40px;">
            <button class="logout-btn" onclick="logout()" style="background: var(--maroon-main); color: #FFF; padding: 12px 28px; border-radius: 999px; font-weight: 800; border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(45, 8, 13, 0.2);">
                <span class="material-symbols-rounded" style="vertical-align: middle; margin-right: 8px; font-size: 1.1rem;">logout</span>
                Logout
            </button>
        </div>

    <div class="filter-box">
        <div class="filter-row">
            <div class="filter-group">
                <label>Select Date</label>
                <input type="date" id="reportDate">
            </div>
            <div class="filter-group">
                <label>Filter by Staff</label>
                <select id="staffFilter">
                    <option value="all">All Staff</option>
                </select>
            </div>
        </div>
        <button class="btn-filter" onclick="fetchReports()">Fetch Reports</button>
    </div>

    <div class="feed-container" id="reportList">
        <div style="text-align: center; padding: 40px; color: #94a3b8; font-size: 0.9rem; font-weight: 500;">
            Loading reports...
        </div>
    </div>

    </main>

    <div id="veFooterMount"></div>
    <script src="../layout.js"></script>

    <script src="../app.js"></script>
    <script src="./adminCommon.js"></script>
    <script src="./adminShell.js"></script>
    <script src="./adminCommon.js"></script>
    
    <script>
        // Default Date
        document.getElementById('reportDate').valueAsDate = new Date();

        async function logout() {
            if(!confirm("Are you sure you want to logout?")) return;
            try { if (typeof VE !== 'undefined') await VE.api('/api/auth/logout', { method: 'POST' }); } catch(e){}
            localStorage.removeItem('ve_auth_token');
            window.location.href = "login.html";
        }

        function fmtTime(value) {
            if (!value) return '--:--';
            const d = new Date(value);
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function fmtDate(value) {
            if (!value) return '';
            const d = new Date(value);
            return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        function mapHref(lat, lng) {
            if (!lat || !lng) return '#';
            return `https://www.google.com/maps?q=${encodeURIComponent(`${lat},${lng}`)}`;
        }

        function esc(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function getApiBaseForAssets() {
            const productionApiBase = 'https://ve-production.up.railway.app';
            try {
                const base = localStorage.getItem('ve_api_base') || '';
                if (base) return String(base).replace(/\/$/, '');
            } catch {}
            try {
                if (window.VE_API_BASE) return String(window.VE_API_BASE).replace(/\/$/, '');
            } catch {}
            return productionApiBase;
        }

        function getAssetBaseCandidates() {
            const bases = [];
            try {
                const stored = localStorage.getItem('ve_api_base') || '';
                if (stored) bases.push(String(stored).replace(/\/$/, ''));
            } catch {}
            try {
                if (window.VE_API_BASE) bases.push(String(window.VE_API_BASE).replace(/\/$/, ''));
            } catch {}
            try {
                const proto = location.protocol || 'http:';
                const host = location.hostname || 'localhost';
                if (proto === 'http:' || proto === 'https:') {
                    bases.push(`${proto}//localhost:3000`);
                    bases.push(`${proto}//${host}:3000`);
                }
            } catch {}
            bases.push('https://ve-production.up.railway.app');
            return [...new Set(bases.filter(Boolean))];
        }

        function normalizeUploadPath(p, kind) {
            const s = String(p || '').replace(/^\/+/, '');
            if (!s) return '';
            if (s.startsWith('uploads/')) return s;
            if (s.startsWith('checkin/') || s.startsWith('checkout/') || s.startsWith('work/') || s.startsWith('profiles/')) {
                return `uploads/${s}`;
            }
            if (!s.includes('/')) return `uploads/${kind}/${s}`;
            return `uploads/${s}`;
        }

        function assetUrl(p) {
            if (!p) return '';
            const base = getApiBaseForAssets();
            const norm = String(p).replace(/^\/+/, '');
            return base ? `${base}/${norm}` : `/${norm}`;
        }

        function assetCandidates(p, kind) {
            const normalized = normalizeUploadPath(p, kind);
            if (!normalized) return [];
            return getAssetBaseCandidates().map((base) => `${base}/${normalized}`);
        }

        function renderThumb(path, kind, alt) {
            const candidates = assetCandidates(path, kind);
            if (!candidates.length) return '';
            return `<img src="${candidates[0]}" class="thumb report-thumb" alt="${esc(alt)}" data-candidates="${esc(JSON.stringify(candidates))}" onclick="window.open(this.src,'_blank')">`;
        }

        function hydrateReportMedia() {
            document.querySelectorAll('.report-thumb').forEach((img) => {
                if (img.dataset.bound === '1') return;
                img.dataset.bound = '1';
                img.addEventListener('error', () => {
                    let candidates = [];
                    try {
                        candidates = JSON.parse(img.dataset.candidates || '[]');
                    } catch {}
                    const current = img.getAttribute('src') || '';
                    const remaining = candidates.filter((url) => url && url !== current);
                    if (!remaining.length) return;
                    img.dataset.candidates = JSON.stringify(remaining);
                    img.src = remaining[0];
                });
            });
        }

        function reportCard(a) {
            const completed = !!a.check_out_time;
            const badge = completed 
                ? `<span class="badge completed">Completed</span>`
                : `<span class="badge working">Working</span>`;

            // Thumbnails
            const inPath = a.check_in_image_path ? normalizeUploadPath(a.check_in_image_path, 'checkin') : '';
            const outPath = a.check_out_image_path ? normalizeUploadPath(a.check_out_image_path, 'checkout') : '';
            const workPath = a.work_image_path ? normalizeUploadPath(a.work_image_path, 'work') : '';
            const voicePath = a.voice_record_path ? normalizeUploadPath(a.voice_record_path, 'work') : '';

            const inSelfie = renderThumb(inPath, 'checkin', 'Check-in selfie');
            const outSelfie = renderThumb(outPath, 'checkout', 'Check-out selfie');
            const workImg = renderThumb(workPath, 'work', 'Work photo');
            
            const voice = voicePath ? `<audio class="audio-player" controls src="${assetUrl(voicePath)}"></audio>` : '';
            const workText = a.work_description ? `<div class="work-text">"${esc(a.work_description)}"</div>` : `<div style="font-size: 0.8rem; color:#94a3b8; font-style:italic;">No written report provided.</div>`;

            return `
            <div class="report-card">
                
                <div class="rc-header">
                    <div class="rc-name">
                        <h3>${esc(a.name)}</h3>
                        <p>${fmtDate(a.date)}</p>
                    </div>
                    ${badge}
                </div>

                <div class="rc-block in">
                    <div class="block-title"><span>🌅</span> Morning Check-In</div>
                    <div class="data-grid">
                        <div class="data-item">
                            <span>Time</span>
                            <span>${fmtTime(a.check_in_time)}</span>
                        </div>
                        <div class="data-item">
                            <span>Location</span>
                            ${a.check_in_lat ? `<a href="${mapHref(a.check_in_lat, a.check_in_lng)}" target="_blank" class="map-link">📍 View Map</a>` : '<span style="color:#94a3b8;">-</span>'}
                        </div>
                    </div>
                    ${inSelfie ? `<div class="media-row">${inSelfie} <span style="font-size: 0.75rem; color:#64748b; font-weight: 600;">Selfie</span></div>` : ''}
                </div>

                <div class="rc-block out">
                    <div class="block-title"><span>🌇</span> Evening Check-Out</div>
                    <div class="data-grid">
                        <div class="data-item">
                            <span>Time</span>
                            <span>${completed ? fmtTime(a.check_out_time) : '<em style="color:#94a3b8; font-weight:500;">Pending</em>'}</span>
                        </div>
                        <div class="data-item">
                            <span>Location</span>
                            ${a.check_out_lat ? `<a href="${mapHref(a.check_out_lat, a.check_out_lng)}" target="_blank" class="map-link">📍 View Map</a>` : '<span style="color:#94a3b8;">-</span>'}
                        </div>
                    </div>
                    ${outSelfie ? `<div class="media-row">${outSelfie} <span style="font-size: 0.75rem; color:#64748b; font-weight: 600;">Selfie</span></div>` : ''}
                </div>

                <div class="rc-block work">
                    <div class="block-title"><span>📋</span> Work Report</div>
                    ${workText}
                    ${(workImg || voice) ? `<div class="media-row">${workImg} ${voice}</div>` : ''}
                </div>

            </div>`;
        }

        function compactReportCard(a) {
            const completed = !!a.check_out_time;
            const badge = completed
                ? `<span class="badge completed">Completed</span>`
                : `<span class="badge working">Working</span>`;

            const inPath = a.check_in_image_path ? normalizeUploadPath(a.check_in_image_path, 'checkin') : '';
            const outPath = a.check_out_image_path ? normalizeUploadPath(a.check_out_image_path, 'checkout') : '';
            const workPath = a.work_image_path ? normalizeUploadPath(a.work_image_path, 'work') : '';
            const voicePath = a.voice_record_path ? normalizeUploadPath(a.voice_record_path, 'work') : '';

            const inSelfie = inPath ? `<img src="${assetUrl(inPath)}" class="thumb" onclick="window.open('${assetUrl(inPath)}','_blank')">` : '';
            const outSelfie = outPath ? `<img src="${assetUrl(outPath)}" class="thumb" onclick="window.open('${assetUrl(outPath)}','_blank')">` : '';
            const workImg = workPath ? `<img src="${assetUrl(workPath)}" class="thumb" onclick="window.open('${assetUrl(workPath)}','_blank')">` : '';
            const voice = voicePath ? `<audio class="audio-player" controls src="${assetUrl(voicePath)}"></audio>` : '';
            const workText = a.work_description
                ? `<div class="work-text">"${esc(a.work_description)}"</div>`
                : `<div style="font-size: 0.8rem; color:#94a3b8; font-style:italic;">No written report provided.</div>`;

            const inTime = fmtTime(a.check_in_time);
            const outTime = completed ? fmtTime(a.check_out_time) : 'Pending';

            return `
            <details class="report-card">
                <summary class="report-summary">
                    <div class="rc-header">
                        <div class="rc-name">
                            <h3>${esc(a.name)}</h3>
                            <p>${fmtDate(a.date)}</p>
                        </div>
                        <div style="display:flex; align-items:center; gap:8px;">
                            ${badge}
                            <span class="report-toggle">⌄</span>
                        </div>
                    </div>

                    <div class="report-main">
                        <div class="report-main-item">
                            <span>Check-In</span>
                            <span>${inTime}</span>
                        </div>
                        <div class="report-main-item">
                            <span>Check-Out</span>
                            <span>${outTime}</span>
                        </div>
                    </div>
                </summary>

                <div class="report-extra">
                    <div class="rc-block in">
                        <div class="block-title"><span>IN</span> Morning Check-In</div>
                        <div class="data-grid">
                            <div class="data-item">
                                <span>Time</span>
                                <span>${inTime}</span>
                            </div>
                            <div class="data-item">
                                <span>Location</span>
                                ${a.check_in_lat ? `<a href="${mapHref(a.check_in_lat, a.check_in_lng)}" target="_blank" class="map-link">View Map</a>` : '<span style="color:#94a3b8;">-</span>'}
                            </div>
                        </div>
                        ${inSelfie ? `<div class="media-row">${inSelfie} <span style="font-size: 0.75rem; color:#64748b; font-weight: 600;">Selfie</span></div>` : ''}
                    </div>

                    <div class="rc-block out">
                        <div class="block-title"><span>OUT</span> Evening Check-Out</div>
                        <div class="data-grid">
                            <div class="data-item">
                                <span>Time</span>
                                <span>${completed ? outTime : '<em style="color:#94a3b8; font-weight:500;">Pending</em>'}</span>
                            </div>
                            <div class="data-item">
                                <span>Location</span>
                                ${a.check_out_lat ? `<a href="${mapHref(a.check_out_lat, a.check_out_lng)}" target="_blank" class="map-link">View Map</a>` : '<span style="color:#94a3b8;">-</span>'}
                            </div>
                        </div>
                        ${outSelfie ? `<div class="media-row">${outSelfie} <span style="font-size: 0.75rem; color:#64748b; font-weight: 600;">Selfie</span></div>` : ''}
                    </div>

                    <div class="rc-block work">
                        <div class="block-title"><span>WR</span> Work Report</div>
                        ${workText}
                        ${(workImg || voice) ? `<div class="media-row">${workImg} ${voice}</div>` : ''}
                    </div>
                </div>
            </details>`;
        }

        async function loadStaffOptions() {
            try {
                if (typeof VEAdmin !== 'undefined') await VEAdmin.ensureAdmin();
                const out = await VE.api('/api/admin/staff');
                const sel = document.getElementById('staffFilter');
                const cur = sel.value;
                const options = `<option value="all">All Staff</option>` + 
                                (out.staff || []).map((s) => `<option value="${s.staff_id}">${esc(s.name)}</option>`).join('');
                sel.innerHTML = options;
                sel.value = cur && cur !== 'all' ? cur : 'all';
            } catch(e) { console.log(e); }
        }

        async function fetchReports() {
            const list = document.getElementById('reportList');
            try {
                const date = document.getElementById('reportDate').value;
                const staff = document.getElementById('staffFilter').value;
                if (!date) return;
                
                list.innerHTML = `<div style="text-align:center; padding: 40px; color:#94a3b8; font-size:0.9rem; font-weight:500;">Fetching data...</div>`;

                const qs = new URLSearchParams({ from: date, to: date });
                if (staff && staff !== 'all') qs.set('staff_id', staff);
                
                const out = await VE.api(`/api/admin/attendance?${qs.toString()}`);
                const rows = out.attendance || [];
                
                if(rows.length > 0) {
                    list.innerHTML = rows.map(compactReportCard).join('');
                    hydrateReportMedia();
                } else {
                    list.innerHTML = `
                    <div style="text-align:center; padding:40px; background:white; border-radius:16px; border:1px dashed #cbd5e1;">
                        <h3 style="color:#64748b; font-size:1rem; margin-bottom:5px;">No Reports Found</h3>
                        <p style="font-size:0.8rem; color:#94a3b8;">Try selecting a different date or staff.</p>
                    </div>`;
                }
            } catch (e) {
                list.innerHTML = `<div style="text-align:center; padding:20px; color:#ef4444;">Error fetching data.</div>`;
            }
        }

        (async function init() {
            await loadStaffOptions();
            await fetchReports(); // Auto-load today's reports
        })();
    </script>
</body>
</html>
