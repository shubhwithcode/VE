<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gallery Curator - Vishwakarma Enterprises</title>

    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="./uiShell.css">

    <style>
        :root {
            --brand-primary: var(--maroon-main);
            --brand-secondary: var(--maroon-deep);
            --bg-color: var(--bg-cream);
            --card-bg: #ffffff;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --border-color: rgba(45, 8, 13, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent;}
        
        body { 
            background-color: var(--bg-cream);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .admin-main {
            padding-top: 120px;
            max-width: 1400px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        /* --- Refined Action Bar --- */
        .action-bar {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            margin: 0 20px 32px 20px;
            padding: 12px 24px;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            border: 1px solid rgba(45, 8, 13, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .search {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            padding: 12px 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            background: #fff;
        }

        .search-box {
            border: none;
            outline: none;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-dark);
            background: transparent;
            width: 100%;
        }

        .add-btn {
            background: var(--gold-accent);
            color: var(--maroon-deep);
            border: none;
            padding: 16px 32px;
            border-radius: 999px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(197, 160, 41, 0.3);
            transition: 0.3s;
        }

        .add-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(197, 160, 41, 0.4);
        }

        /* --- Gallery Grid --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 0 20px;
        }

        .gallery-item {
            background: #FFF;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
        }

        .image-wrapper {
            position: relative;
            aspect-ratio: 4/3;
            overflow: hidden;
            background: #f3f4f6;
        }

        .gallery-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.6s;
        }

        .gallery-item:hover .gallery-img {
            transform: scale(1.1);
        }

        .item-overlay {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.9);
            color: white;
        }

        .btn-delete:hover {
            background: #ef4444;
            transform: scale(1.1);
        }

        .item-info {
            padding: 20px;
        }

        .item-category {
            display: inline-block;
            background: rgba(45, 8, 13, 0.05);
            color: var(--maroon-main);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .item-desc {
            font-size: 0.95rem;
            color: var(--text-dark);
            font-weight: 600;
            line-height: 1.4;
        }

        /* --- Modal Forms --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(45, 8, 13, 0.4); backdrop-filter: blur(8px);
            z-index: 999; display: none; opacity: 0; transition: 0.3s;
        }
        .modal-overlay.show { display: block; opacity: 1; }

        .modal-card {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -40%);
            width: 90%; max-width: 500px; background: white;
            border-radius: 32px; padding: 40px; z-index: 1000;
            display: none; transition: 0.4s; box-shadow: 0 40px 100px rgba(0,0,0,0.2);
        }
        .modal-card.show { display: block; transform: translate(-50%, -50%); }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--maroon-deep);
            margin-bottom: 24px;
            text-align: center;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;}
        .input-group input, .input-group select, .input-group textarea {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border-color);
            font-size: 1rem; background: #f9fafb; font-weight: 600; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--maroon-main); background: #FFF; box-shadow: 0 0 0 4px rgba(45, 8, 13, 0.05); }

        .btn-submit {
            width: 100%; padding: 18px; background: var(--maroon-main); color: white;
            border: none; border-radius: 999px; font-size: 1rem; font-weight: 800;
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(45, 8, 13, 0.2);
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(45, 8, 13, 0.3); }

        #uploadStatus { text-align: center; margin-top: 15px; font-weight: 700; font-size: 0.85rem; }

    </style>
</head>
<body>

    <div id="veHeaderMount"></div>

    <main class="admin-main container">
        <header class="showroom-title reveal active" style="margin-bottom: 40px;">
            <p class="hero-subtitle">Visual Curation</p>
            <h1>Gallery Curator</h1>
            <div class="divider"></div>
        </header>

        <div class="action-bar">
            <div class="search">
                <span class="material-symbols-rounded" style="color: var(--maroon-main);">search</span>
                <input type="text" class="search-box" id="gallerySearch" placeholder="Search categories (e.g. Sofa, Bed)...">
            </div>
            <button class="add-btn" onclick="openModal()">
                Add Masterpiece
            </button>
        </div>

        <div class="gallery-grid" id="galleryGrid">
            <!-- Dynamic Content -->
        </div>
    </main>

    <!-- Upload Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
    <div class="modal-card" id="uploadModal">
        <h2 class="modal-title">New Gallery Item</h2>
        <form id="uploadForm">
            <div class="input-group">
                <label>Category</label>
                <select id="itemCategory" required>
                    <option value="" disabled selected>Select Category</option>
                    <option value="Sofa">Sofa Set</option>
                    <option value="Bed">Royal Bed</option>
                    <option value="Dining">Dining Table</option>
                    <option value="Wardrobe">Wardrobe</option>
                    <option value="Temple">Teak Wood Temple</option>
                    <option value="Classic">Classic Collection</option>
                    <option value="Modern">Modern Minimalist</option>
                </select>
            </div>
            <div class="input-group">
                <label>Short Description</label>
                <input type="text" id="itemDesc" placeholder="e.g. Handcrafted Teak Sofa with Gold leafing" required>
            </div>
            <div class="input-group">
                <label>Select Image</label>
                <input type="file" id="itemFile" accept="image/*" required style="padding: 10px;">
            </div>
            <div id="uploadStatus"></div>
            <button type="submit" class="btn-submit">Publish to Gallery</button>
        </form>
    </div>

    <div id="veFooterMount"></div>
    <script src="../layout.js"></script>
    <script src="../app.js"></script>
    <script src="./adminCommon.js"></script>

    <script>
        const galleryGrid = document.getElementById('galleryGrid');
        const uploadStatus = document.getElementById('uploadStatus');

        function openModal() {
            document.getElementById('modalOverlay').classList.add('show');
            document.getElementById('uploadModal').classList.add('show');
            uploadStatus.textContent = '';
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
            document.getElementById('uploadModal').classList.remove('show');
            document.getElementById('uploadForm').reset();
        }

        function getAssetUrl(path) {
            const base = localStorage.getItem('ve_api_base') || '';
            const norm = String(path).replace(/^\/+/, '');
            return base ? `${base}/${norm}` : `/${norm}`;
        }

        function createCard(item) {
            return `
                <div class="gallery-item" data-category="${item.category.toLowerCase()}">
                    <div class="image-wrapper">
                        <img src="${getAssetUrl(item.image_path)}" class="gallery-img" alt="${item.description}">
                        <div class="item-overlay">
                            <button class="btn-icon btn-delete" onclick="deleteItem(${item.id})" title="Delete masterpiece">
                                <span class="material-symbols-rounded">delete</span>
                            </button>
                        </div>
                    </div>
                    <div class="item-info">
                        <span class="item-category">${item.category}</span>
                        <p class="item-desc">${item.description || 'Premium craftsmanship'}</p>
                    </div>
                </div>
            `;
        }

        async function loadGallery() {
            galleryGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: #9ca3af;">Loading the collection...</div>';
            try {
                const out = await VE.api('/api/admin/gallery');
                if (out.gallery && out.gallery.length > 0) {
                    galleryGrid.innerHTML = out.gallery.map(createCard).join('');
                } else {
                    galleryGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: #9ca3af;">The gallery is currently empty.</div>';
                }
            } catch (e) {
                galleryGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: #ef4444;">Failed to load the gallery.</div>';
            }
        }

        async function deleteItem(id) {
            if (!confirm('Are you sure you want to remove this masterpiece from the gallery?')) return;
            try {
                await VE.api(`/api/admin/gallery/${id}`, { method: 'DELETE' });
                await loadGallery();
            } catch (e) {
                alert('Removal failed: ' + e.message);
            }
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            uploadStatus.textContent = 'Uploading...';
            uploadStatus.style.color = 'var(--maroon-main)';

            const fd = new FormData();
            fd.append('category', document.getElementById('itemCategory').value);
            fd.append('description', document.getElementById('itemDesc').value);
            fd.append('image', document.getElementById('itemFile').files[0]);

            try {
                await VE.api('/api/admin/gallery', {
                    method: 'POST',
                    body: fd
                });
                uploadStatus.textContent = 'Successfully published!';
                uploadStatus.style.color = '#10b981';
                setTimeout(() => {
                    closeModal();
                    loadGallery();
                }, 1000);
            } catch (e) {
                uploadStatus.textContent = e.message || 'Upload failed';
                uploadStatus.style.color = '#ef4444';
            }
        });

        // Search filtering
        document.getElementById('gallerySearch').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.gallery-item').forEach(card => {
                const cat = card.getAttribute('data-category');
                card.style.display = cat.includes(query) ? '' : 'none';
            });
        });

        (async function init() {
            if (typeof VEAdmin !== 'undefined') await VEAdmin.ensureAdmin();
            loadGallery();
        })();
    </script>
</body>
</html>
