<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feedback System - Vishwakarma Enterprises</title>

    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="./uiShell.css">

    <style>
        :root {
            --brand-primary: var(--maroon-main);
            --brand-secondary: var(--maroon-deep);
            --bg-color: var(--bg-cream);
            --card-bg: #ffffff;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --border-color: rgba(45, 8, 13, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent;}
        
        body { 
            background-color: var(--bg-cream);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .admin-main {
            padding-top: 120px;
            max-width: 1400px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        /* --- Feedback Cards --- */
        .feedback-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 0 20px;
        }

        .feedback-card {
            background: #FFF;
            border-radius: 28px;
            padding: 30px;
            border: 1px solid var(--border-color);
            transition: 0.3s;
            position: relative;
        }

        .feedback-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            border-color: var(--gold-accent);
        }

        .feedback-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .curator-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--maroon-deep);
        }

        .rating-stars {
            display: flex;
            gap: 2px;
            color: var(--gold-accent);
        }

        .rating-stars .material-symbols-rounded {
            font-size: 1.1rem;
            font-variation-settings: 'FILL' 1;
        }

        .feedback-text {
            font-size: 1rem;
            line-height: 1.5;
            color: #4b5563;
            font-weight: 500;
            font-style: italic;
            margin-bottom: 25px;
            min-height: 60px;
        }

        .feedback-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid rgba(45, 8, 13, 0.1);
        }

        .visibility-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .toggle-label {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #e5e7eb; transition: .4s; border-radius: 34px;
        }

        .slider:before {
            position: absolute; content: "";
            height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--maroon-main); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-delete {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: #fee2e2;
            color: #ef4444;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .btn-delete:hover { transform: scale(1.1); }

    </style>
</head>
<body>

    <div id="veHeaderMount"></div>

    <main class="admin-main container">
        <header class="showroom-title reveal active" style="margin-bottom: 50px;">
            <p class="hero-subtitle">Brand Reputation</p>
            <h1>Feedback System</h1>
            <div class="divider"></div>
        </header>

        <div class="feedback-grid" id="feedbackGrid">
            <!-- Dynamic Feedback -->
        </div>

    </main>

    <div id="veFooterMount"></div>
    <script src="../layout.js"></script>
    <script src="../app.js"></script>
    <script src="./adminCommon.js"></script>

    <script>
        const feedbackGrid = document.getElementById('feedbackGrid');

        function createStars(rating) {
            let stars = '';
            for (let i = 0; i < 5; i++) {
                stars += `<span class="material-symbols-rounded" style="${i < rating ? '' : 'font-variation-settings: \'FILL\' 0; opacity: 0.3;'}">star</span>`;
            }
            return stars;
        }

        function createFeedbackCard(f) {
            return `
                <div class="feedback-card">
                    <div class="feedback-header">
                        <span class="curator-name">${f.customer_name}</span>
                        <div class="rating-stars">
                            ${createStars(f.rating)}
                        </div>
                    </div>
                    <p class="feedback-text">"${f.comment || 'The client shared their experience in the showroom.'}"</p>
                    <div class="feedback-footer">
                        <div class="visibility-toggle" onclick="toggleVisibility(${f.id}, ${f.is_public})">
                            <span class="toggle-label">${f.is_public ? 'Live on Site' : 'Hidden'}</span>
                            <label class="switch">
                                <input type="checkbox" ${f.is_public ? 'checked' : ''} onclick="event.preventDefault()">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <button class="btn-delete" onclick="deleteFeedback(${f.id})" title="Delete testimonial">
                            <span class="material-symbols-rounded" style="font-size: 1.1rem;">delete</span>
                        </button>
                    </div>
                </div>
            `;
        }

        async function loadFeedback() {
            feedbackGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: #9ca3af;">Streaming client experiences...</div>';
            try {
                const out = await VE.api('/api/admin/feedback');
                if (out.feedback && out.feedback.length > 0) {
                    feedbackGrid.innerHTML = out.feedback.map(createFeedbackCard).join('');
                } else {
                    feedbackGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: #9ca3af;">No testimonials shared by clients yet.</div>';
                }
            } catch (e) {
                feedbackGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: #ef4444;">Feedback transmission failed.</div>';
            }
        }

        async function toggleVisibility(id, current) {
            try {
                await VE.api(`/api/admin/feedback/${id}`, {
                    method: 'PATCH',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({ is_public: !current })
                });
                await loadFeedback();
            } catch (e) { alert('Action failed: ' + e.message); }
        }

        async function deleteFeedback(id) {
            if(!confirm('Are you sure you want to remove this testimonial?')) return;
            try {
                await VE.api(`/api/admin/feedback/${id}`, { method: 'DELETE' });
                await loadQueries();
            } catch (e) { alert('Action failed: ' + e.message); }
        }

        (async function init() {
            if (typeof VEAdmin !== 'undefined') await VEAdmin.ensureAdmin();
            loadFeedback();
        })();
    </script>
</body>
</html>
