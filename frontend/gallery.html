<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Vishwakarma Premium Furniture</title>
  
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
</head>

<body>

  <div id="veHeaderMount"></div>

  <main class="container" style="padding-top: 140px; padding-bottom: 120px;">
    
    <section class="showroom-title reveal active">
      <span class="hero-subtitle">VISHWAKARMA COLLECTIONS</span>
      <h1 style="font-family: 'Playfair Display'; font-weight: 700;">Showroom Masterpieces</h1>
      <div class="divider" style="margin: 16px auto; width: 60px; height: 3px;"></div>
      <div id="status" class="product-category" style="font-weight: 700; color: var(--gold-accent); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;">Loading collections...</div>
    </section>

    <section>
      <!-- Optimized Filters -->
      <div class="galleryFilters reveal active" style="transition-delay: 0.1s;">
         <div class="searchBox">
            <input id="q" type="text" placeholder="Search by piece or material... (e.g. Teak, Sofa, Royal)" autocomplete="off" />
            <span class="material-symbols-rounded searchIcon">search</span>
         </div>
         <div id="cats" class="categoryNav">
           <!-- Categories dynamically injected -->
         </div>
      </div>

      <!-- Result Grid -->
      <div id="grid" class="products-grid reveal active" style="margin-top: 80px; transition-delay: 0.2s;">
         <!-- Cards dynamically injected from customer.js -->
      </div>
    </section>

  </main>

  <div id="veFooterMount"></div>

  <!-- Scripts -->
  <script src="app.js"></script>
  <script src="layout.js"></script>
  <script src="customer.js"></script>

</body>
</html>
